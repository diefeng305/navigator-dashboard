name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: diefeng305/navigator-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: List files for debug
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Backend directory ==="
          ls -la backend/ || echo "backend not found"
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
      
      # ========== 新增验证步骤 ==========
      - name: Verify image content
        run: |
          echo "=== Checking image content ==="
          docker run --rm ${{ env.IMAGE_NAME }}:latest ls -la /app/
          docker run --rm ${{ env.IMAGE_NAME }}:latest ls -la /app/backend/ || echo "backend missing"
          docker run --rm ${{ env.IMAGE_NAME }}:latest cat /app/backend/app.py | head -5 || echo "app.py missing"
          docker run --rm ${{ env.IMAGE_NAME }}:latest python -c "print('Python works')"
      
      - name: Image digest
        run: echo "Image built and pushed successfully"