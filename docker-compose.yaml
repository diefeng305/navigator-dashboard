version: '3.8'

services:
  navigator-dev:
    image: python:3.11-slim
    container_name: navigator-debug
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "pip install -i https://pypi.tuna.tsinghua.edu.cn/simple flask psutil requests beautifulsoup4 lxml &&
             python backend/app.py"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/config"]
      interval: 30s
      timeout: 10s
      retries: 3