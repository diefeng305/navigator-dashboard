<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: #0b111e; 
            color: #e2e8f0; 
            height: 100vh; 
            overflow: hidden;
        }
        .admin-container { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .admin-horizontal-tabs { 
            width: 100%; 
            height: 55px; 
            background-color: #0f182a; 
            border-bottom: 1px solid #1e293b; 
            display: flex; 
            align-items: center; 
            padding: 0 30px; 
            gap: 10px; 
            flex-shrink: 0;
            overflow-x: auto;
            overflow-y: hidden;
        }
        .tab-btn { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 10px 20px; 
            color: #94a3b8; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .tab-btn:hover { background-color: rgba(30, 41, 59, 0.5); color: #fff; }
        .tab-btn.active { background-color: rgba(0, 240, 255, 0.1); color: #00f0ff; font-weight: 600; }
        .admin-tab-content { 
            flex: 1; 
            width: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 24px 30px;
        }
        .tab-panel { 
            display: none; 
            width: 100%;
            height: auto;
            min-height: 100%;
            animation: fadeIn 0.25s ease;
        }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        .panel-grid { display: flex; gap: 30px; flex-wrap: wrap; }
        .panel-form { 
            flex: 1; 
            min-width: 300px;
            background: #0f182a; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            padding: 25px; 
            height: fit-content; 
        }
        .panel-table { 
            flex: 2; 
            min-width: 400px;
            display: flex; 
            flex-direction: column; 
        }
        .table-wrapper { 
            flex: 1; 
            overflow-y: auto; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            background: #0f182a; 
            max-height: 500px;
        }
        h3 { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: #fff; }
        
        .form-group { position: relative; margin-bottom: 22px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; 
            padding: 12px 10px 8px 5px; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #1e293b; 
            color: #fff; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.2s; 
        }
        .form-group textarea {
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 10px;
            resize: vertical;
            font-family: monospace;
        }
        .form-group select { background-color: #0f182a; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-bottom-color: #00f0ff; }
        .form-group label { 
            position: absolute; 
            left: 5px; 
            top: 12px; 
            color: #475569; 
            font-size: 14px; 
            pointer-events: none; 
            transition: all 0.2s ease; 
        }
        .form-group input:focus ~ label, .form-group input:valid ~ label, 
        .form-group textarea:focus ~ label, .form-group textarea:valid ~ label { top: -10px; font-size: 11px; color: #00f0ff; }
        .form-group .select-label { top: -10px; font-size: 11px; color: #475569; position: relative; display: block; margin-bottom: 5px; left: 0; }
        
        .icon-selector-wrapper { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .icon-selector-wrapper input { flex: 1; min-width: 200px; }
        .btn-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .btn-cyan { 
            background: linear-gradient(135deg, #00f0ff, #0072ff); 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 13px; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-cyan:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3); }
        .btn-slate { 
            background-color: #1e293b; 
            color: #94a3b8; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 8px; 
            font-weight: 500; 
            font-size: 13px; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: all 0.2s;
        }
        .btn-slate:hover { background-color: #334155; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #1e293b; }
        th { background-color: #131e35; color: #64748b; font-weight: 600; position: sticky; top: 0; }
        tr:hover td { background-color: #142037; }
        .action-icon-btn { background: none; border: none; cursor: pointer; font-size: 13px; margin-left: 12px; font-weight: 500; }
        .act-edit { color: #f59e0b; } 
        .act-del { color: #ef4444; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; background: rgba(0, 240, 255, 0.1); color: #00f0ff; display: inline-block; }
        
        .theme-settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; }
        .theme-card { background: #0f182a; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; }
        .preset-themes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .preset-theme-item { text-align: center; cursor: pointer; transition: all 0.2s ease; padding: 8px; border-radius: 12px; }
        .preset-theme-item:hover { background: rgba(30, 41, 59, 0.5); transform: translateY(-2px); }
        .preset-theme-item.active { background: rgba(0, 240, 255, 0.1); border: 1px solid #00f0ff; }
        .preset-preview { width: 80px; height: 60px; border-radius: 8px; margin: 0 auto 8px; border: 1px solid #1e293b; }
        .dark-cyan-preview { background: linear-gradient(135deg, #00f0ff, #0088aa); }
        .dark-purple-preview { background: linear-gradient(135deg, #a855f7, #7c3aed); }
        .dark-blue-preview { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .dark-green-preview { background: linear-gradient(135deg, #10b981, #059669); }
        .dark-orange-preview { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .dark-pink-preview { background: linear-gradient(135deg, #ec4899, #db2777); }
        .color-picker-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
        .color-item { display: flex; flex-direction: column; gap: 8px; }
        .color-item label { font-size: 12px; color: #64748b; }
        .color-item input[type="color"] { width: 100%; height: 40px; background: #0b111e; border: 1px solid #1e293b; border-radius: 8px; cursor: pointer; padding: 4px; }
        .toggle-setting { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .toggle-setting:last-child { border-bottom: none; }
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1e293b; transition: 0.3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #64748b; transition: 0.3s; border-radius: 50%; }
        input:checked + .slider { background: linear-gradient(135deg, #00f0ff, #7000ff); }
        input:checked + .slider:before { transform: translateX(24px); background-color: white; }
        
        .sys-info-box { background: #0f182a; border: 1px solid #1e293b; border-radius: 12px; padding: 25px; }
        .sys-stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .sys-stat-row:last-child { border-bottom: none; }
        .access-denied { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: #64748b; }
        .access-denied i { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        
        .icon-preview { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 38px; 
            height: 38px; 
            margin-left: 10px; 
            background: rgba(15, 23, 42, 0.8); 
            border: 1px solid #00f0ff; 
            border-radius: 6px; 
            color: #00f0ff; 
            font-size: 18px; 
            vertical-align: middle; 
            overflow: hidden; 
        }
        .icon-preview img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
        
        .icon-picker-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(5, 8, 15, 0.8); 
            backdrop-filter: blur(6px); 
            z-index: 150; 
            display: none; 
            align-items: center;
            justify-content: center;
        }
        .icon-picker-box { 
            width: 650px; 
            max-width: 90vw;
            height: 500px; 
            background: #0f182a; 
            border: 1px solid #1e293b; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .icon-picker-header { padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .icon-search-bar { padding: 15px 20px; border-bottom: 1px solid #1e293b; }
        .icon-search-bar input { width: 100%; background: #0b111e; border: 1px solid #1e293b; border-radius: 8px; padding: 10px 15px; color: #fff; outline: none; }
        .icon-grid-viewport { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; }
        .icon-picker-card { 
            background: #0b111e; 
            border: 1px solid #1e293b; 
            border-radius: 8px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
            cursor: pointer; 
            transition: all 0.15s; 
        }
        .icon-picker-card:hover { border-color: #00f0ff; transform: scale(1.05); }
        .icon-picker-card i { font-size: 20px; color: #94a3b8; }
        .icon-picker-card img { width: 20px; height: 20px; object-fit: contain; }
        .icon-picker-card span { font-size: 10px; color: #64748b; text-align: center; word-break: break-all; }
        .close-icon { font-size: 20px; cursor: pointer; color: #475569; }
        .close-icon:hover { color: #ef4444; }
        
        .icons-manager { background: #0f182a; border-radius: 16px; padding: 24px; }
        .icons-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .icons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 16px; max-height: 400px; overflow-y: auto; }
        .icon-item { background: #0b111e; border: 1px solid #1e293b; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .icon-item:hover { border-color: #00f0ff; transform: translateY(-2px); }
        .icon-item img { width: 48px; height: 48px; object-fit: contain; margin-bottom: 8px; }
        .icon-item .icon-name { font-size: 11px; color: #64748b; word-break: break-all; }
        .icon-item .delete-icon { 
            position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.8); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; opacity: 0; transition: opacity 0.2s; 
        }
        .icon-item:hover .delete-icon { opacity: 1; }
        .icon-item .copy-hint { 
            position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); background: #00f0ff; color: #0b111e; font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; display: none; 
        }
        .icon-item .copy-hint.show { display: block; }
        .loading-placeholder { text-align: center; padding: 40px; color: #64748b; }
        
        .home-settings-iframe {
            width: 100%;
            height: calc(100vh - 140px);
            border: none;
            background: #0b111e;
            border-radius: 12px;
        }
        .loading { display: flex; justify-content: center; align-items: center; height: 200px; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(0, 240, 255, 0.1); border-top-color: #00f0ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .admin-tab-content { padding: 16px; }
            .panel-grid { flex-direction: column; }
            .panel-table { min-width: auto; }
            .theme-settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="adminApp"><div class="loading"><div class="spinner"></div></div></div>

    <script>
        var fontAwesomeIcons = [
            { name: '首页', class: 'fa-solid fa-house', cat: '系统' },
            { name: '仪表盘', class: 'fa-solid fa-gauge-high', cat: '系统' },
            { name: '终端', class: 'fa-solid fa-terminal', cat: '系统' },
            { name: '设置', class: 'fa-solid fa-sliders', cat: '系统' },
            { name: '工具', class: 'fa-solid fa-screwdriver-wrench', cat: '系统' },
            { name: '安全', class: 'fa-solid fa-shield-halved', cat: '系统' },
            { name: '服务器', class: 'fa-solid fa-server', cat: '存储' },
            { name: '硬盘', class: 'fa-solid fa-hdd', cat: '存储' },
            { name: '云', class: 'fa-solid fa-cloud', cat: '存储' },
            { name: '文件夹', class: 'fa-solid fa-folder-open', cat: '存储' },
            { name: '同步', class: 'fa-solid fa-arrows-rotate', cat: '存储' },
            { name: '分享', class: 'fa-solid fa-share-nodes', cat: '存储' },
            { name: '视频', class: 'fa-solid fa-video', cat: '媒体' },
            { name: '电影', class: 'fa-solid fa-film', cat: '媒体' },
            { name: '相册', class: 'fa-solid fa-images', cat: '媒体' },
            { name: '音乐', class: 'fa-solid fa-music', cat: '媒体' },
            { name: '电视', class: 'fa-solid fa-tv', cat: '媒体' },
            { name: '网络', class: 'fa-solid fa-globe', cat: '网络' },
            { name: 'Docker', class: 'fa-solid fa-cubes', cat: '网络' },
            { name: '下载', class: 'fa-solid fa-download', cat: '网络' },
            { name: '用户', class: 'fa-solid fa-users', cat: '网络' },
            { name: '数据库', class: 'fa-solid fa-database', cat: '网络' },
            { name: '代码', class: 'fa-solid fa-code', cat: '网络' },
            { name: '书签', class: 'fa-solid fa-bookmark', cat: '系统' },
            { name: '搜索', class: 'fa-solid fa-magnifying-glass', cat: '系统' },
            { name: '邮件', class: 'fa-solid fa-envelope', cat: '网络' },
            { name: '日历', class: 'fa-solid fa-calendar', cat: '系统' },
            { name: '图表', class: 'fa-solid fa-chart-line', cat: '系统' },
            { name: '通知', class: 'fa-solid fa-bell', cat: '系统' }
        ];

        var currentUserRole = null, currentUsername = null;

        async function checkAuth() {
            var role = localStorage.getItem('nav_role'), username = localStorage.getItem('nav_user');
            if (role === 'admin' && username) { currentUserRole = role; currentUsername = username; return true; }
            return false;
        }

        function showAccessDenied() {
            document.getElementById('adminApp').innerHTML = '<div class="access-denied"><i class="fa-solid fa-lock"></i><h2>访问受限</h2><p>您没有权限访问系统设置页面</p><button class="btn-cyan" onclick="window.parent.location.href=\'/\'">返回首页</button></div>';
        }

        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        function initTabs() {
            var tabBtns = document.querySelectorAll('.tab-btn');
            var tabPanels = document.querySelectorAll('.tab-panel');
            
            tabBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var targetTab = this.getAttribute('data-tab');
                    if (!targetTab) return;
                    tabBtns.forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    tabPanels.forEach(function(p) { p.classList.remove('active'); });
                    var targetPanel = document.getElementById(targetTab);
                    if (targetPanel) targetPanel.classList.add('active');
                });
            });
        }

        function createIconPreview(inputElement) {
            var oldPreview = inputElement.parentNode.querySelector('.icon-preview');
            if (oldPreview) oldPreview.remove();
            
            var previewSpan = document.createElement('span');
            previewSpan.className = 'icon-preview';
            previewSpan.innerHTML = '<i class="fa-solid fa-link" style="color:#475569; font-size:14px;"></i>';
            inputElement.parentNode.appendChild(previewSpan);
            
            var updatePreview = function() {
                var val = inputElement.value.trim();
                if (!val) { 
                    previewSpan.innerHTML = '<i class="fa-solid fa-link" style="color:#475569; font-size:14px;"></i>';
                    previewSpan.style.borderColor = '#1e293b';
                    return; 
                }
                if (val.includes('fa-')) {
                    previewSpan.innerHTML = '<i class="' + val + '" style="font-size:18px;"></i>';
                    previewSpan.style.borderColor = '#00f0ff';
                } else if (val.startsWith('/assets/')) {
                    previewSpan.innerHTML = '<img src="' + val + '" style="width:100%; height:100%; object-fit:contain; padding:4px;" onerror="this.parentNode.innerHTML=\'<i class=\\"fa-solid fa-image-slash\\" style=\\"color:#ef4444;\\"></i>\'">';
                    previewSpan.style.borderColor = '#00f0ff';
                } else {
                    previewSpan.innerHTML = '<i class="fa-solid fa-question" style="color:#64748b; font-size:14px;"></i>';
                    previewSpan.style.borderColor = '#f59e0b';
                }
            };
            inputElement.addEventListener('input', updatePreview);
            inputElement.addEventListener('change', updatePreview);
            updatePreview();
        }

        async function loadIcons() {
            var grid = document.getElementById('iconsGrid');
            if (!grid) return;
            grid.innerHTML = '<div class="loading-placeholder">加载中...</div>';
            try {
                var response = await fetch('/api/icons');
                var icons = await response.json();
                if (icons.length === 0) { 
                    grid.innerHTML = '<div class="loading-placeholder"><i class="fa-solid fa-images"></i><p>暂无图标，点击上传按钮添加</p></div>'; 
                    return; 
                }
                grid.innerHTML = icons.map(function(icon) {
                    return '<div class="icon-item" data-path="' + icon.path + '">' +
                        '<div class="delete-icon" data-id="' + icon.id + '"><i class="fa-solid fa-trash"></i></div>' +
                        '<img src="' + icon.path + '" onerror="this.src=\'https://placehold.co/48x48/1e293b/64748b?text=?\'">' +
                        '<div class="icon-name">' + escapeHtml(icon.original_name || icon.filename) + '</div>' +
                        '<div class="copy-hint">已复制路径</div>' +
                        '</div>';
                }).join('');
                
                grid.querySelectorAll('.icon-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('delete-icon') || e.target.closest('.delete-icon')) return;
                        var path = this.dataset.path;
                        navigator.clipboard.writeText(path).then(function() { 
                            var hint = item.querySelector('.copy-hint'); 
                            hint.classList.add('show'); 
                            setTimeout(function() { hint.classList.remove('show'); }, 1500); 
                        });
                    });
                });
                
                grid.querySelectorAll('.delete-icon').forEach(function(btn) {
                    btn.addEventListener('click', async function(e) {
                        e.stopPropagation();
                        var id = this.dataset.id;
                        if (!id) { alert('刷新页面后重试'); return; }
                        if (confirm('确定删除这个图标吗？')) {
                            var response = await fetch('/api/icons/delete/' + id, { method: 'DELETE' });
                            if (response.ok) loadIcons(); 
                            else alert('删除失败');
                        }
                    });
                });
            } catch (error) { 
                grid.innerHTML = '<div class="loading-placeholder"><i class="fa-solid fa-circle-exclamation"></i><p>加载失败</p></div>'; 
            }
        }

        function initIconManager() {
            var uploadBtn = document.getElementById('uploadIconBtn'), fileInput = document.getElementById('iconUploadInput');
            if (!uploadBtn) return;
            uploadBtn.onclick = function() { fileInput.click(); };
            fileInput.onchange = async function(e) {
                var file = this.files[0];
                if (!file) return;
                var formData = new FormData();
                formData.append('file', file);
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 上传中...';
                try {
                    var response = await fetch('/api/icons/upload', { method: 'POST', body: formData });
                    var result = await response.json();
                    if (result.success) { loadIcons(); fileInput.value = ''; }
                    else alert(result.message || '上传失败');
                } catch (error) { alert('上传失败: ' + error.message); }
                finally { uploadBtn.disabled = false; uploadBtn.innerHTML = '<i class="fa-solid fa-upload"></i> 上传图标'; }
            };
            loadIcons();
        }

        function initIconPicker() {
            var overlay = document.getElementById('iconPickerOverlay');
            var grid = document.getElementById('iconGridContainer');
            var searchInput = document.getElementById('iconSearchInput');
            var itemIconInput = document.getElementById('itemIcon');
            
            if (!overlay || !grid) return;
            
            var localIcons = [];
            
            async function loadLocalIcons() {
                try {
                    var response = await fetch('/api/icons');
                    var icons = await response.json();
                    localIcons = icons.map(function(icon) {
                        return { name: icon.original_name || icon.filename, path: icon.path, isLocal: true };
                    });
                    return localIcons;
                } catch (error) {
                    return [];
                }
            }
            
            async function renderIcons(filter) {
                var keyword = filter.toLowerCase();
                var fontAwesomeFiltered = fontAwesomeIcons.filter(function(i) { return i.name.toLowerCase().includes(keyword) || i.class.toLowerCase().includes(keyword); });
                var localFiltered = localIcons.filter(function(i) { return i.name.toLowerCase().includes(keyword); });
                
                var html = '';
                
                if (localFiltered.length > 0) {
                    html += '<div style="grid-column:1/-1; padding:8px 0; color:#00f0ff; font-size:12px;"><i class="fa-solid fa-images"></i> 本地图标</div>';
                    html += localFiltered.map(function(icon) {
                        return '<div class="icon-picker-card" data-icon="' + icon.path + '">' +
                            '<img src="' + icon.path + '" style="width:24px; height:24px; object-fit:contain;">' +
                            '<span>' + (icon.name.length > 10 ? icon.name.substring(0,8)+'...' : icon.name) + '</span>' +
                            '</div>';
                    }).join('');
                }
                
                if (fontAwesomeFiltered.length > 0) {
                    html += '<div style="grid-column:1/-1; padding:8px 0; color:#00f0ff; font-size:12px; margin-top:8px;"><i class="fa-brands fa-font-awesome"></i> Font Awesome 图标库</div>';
                    html += fontAwesomeFiltered.map(function(icon) {
                        return '<div class="icon-picker-card" data-icon="' + icon.class + '">' +
                            '<i class="' + icon.class + '" style="font-size:24px;"></i>' +
                            '<span>' + icon.name + '</span>' +
                            '</div>';
                    }).join('');
                }
                
                if (localFiltered.length === 0 && fontAwesomeFiltered.length === 0) {
                    html = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">没有找到匹配的图标</div>';
                }
                
                grid.innerHTML = html;
                
                grid.querySelectorAll('.icon-picker-card').forEach(function(card) {
                    card.onclick = function() {
                        var iconValue = this.dataset.icon;
                        itemIconInput.value = iconValue;
                        itemIconInput.dispatchEvent(new Event('input'));
                        overlay.style.display = 'none';
                    };
                });
            }
            
            var openBtn = document.getElementById('openIconPreviewBtn');
            if (openBtn) {
                openBtn.onclick = async function() {
                    await loadLocalIcons();
                    overlay.style.display = 'flex';
                    renderIcons('');
                };
            }
            
            var closeBtn = document.getElementById('closeIconPicker');
            if (closeBtn) closeBtn.onclick = function() { overlay.style.display = 'none'; };
            
            if (searchInput) searchInput.oninput = function(e) { renderIcons(e.target.value); };
            
            overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };
        }

        async function loadWelcomeConfig() {
            try {
                var response = await fetch('/api/home/page-config');
                var config = await response.json();
                var showWelcomeToggle = document.getElementById('showWelcomeToggle');
                var showDateTimeToggle = document.getElementById('showDateTimeToggle');
                var customWelcomeInput = document.getElementById('customWelcomeInput');
                
                if (showWelcomeToggle) showWelcomeToggle.checked = config.show_welcome !== false;
                if (showDateTimeToggle) showDateTimeToggle.checked = config.show_datetime !== false;
                if (customWelcomeInput) customWelcomeInput.value = config.custom_welcome || '';
            } catch (error) {
                console.error('加载欢迎配置失败:', error);
            }
        }

        async function saveWelcomeConfig() {
            var showWelcome = document.getElementById('showWelcomeToggle').checked;
            var showDateTime = document.getElementById('showDateTimeToggle').checked;
            var customWelcome = document.getElementById('customWelcomeInput').value;
            
            try {
                var response = await fetch('/api/home/page-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        show_welcome: showWelcome,
                        show_datetime: showDateTime,
                        custom_welcome: customWelcome
                    })
                });
                
                if (response.ok) {
                    alert('配置已保存');
                    window.parent.postMessage({ type: 'refreshHome' }, '*');
                } else {
                    alert('保存失败');
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }

            if (iframe && iframe.contentWindow) {

            }

        function initNavManagement(navItems) {
            var select = document.getElementById('itemParent');
            select.innerHTML = '<option value="0">无 (顶级大类)</option>';
            navItems.filter(function(i) { return i.parent_id === 0 && i.url !== '#admin_panel' && i.url !== '#dashboard_home'; }).forEach(function(root) { 
                select.innerHTML += '<option value="' + root.id + '">' + escapeHtml(root.title) + '</option>'; 
            });
            
            function renderTable() {
                var tbody = document.getElementById('adminTableBody');
                if (!tbody) return;
                tbody.innerHTML = '';
                navItems.forEach(function(item) {
                    if (item.url === '#admin_panel' || item.url === '#dashboard_home') return;
                    var iconHtml = item.icon ? (item.icon.includes('fa-') ? '<i class="' + item.icon + '" style="margin-right:6px;"></i>' : '<img src="' + item.icon + '" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:6px;">') : '';
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td>' + iconHtml + (item.parent_id > 0 ? '— ' : '') + escapeHtml(item.title) + '</td><td>' + (item.open_type === 'iframe' ? '内嵌' : '新窗口') + '</td><td><span class="badge">' + item.min_role_required + '</span></td><td style="text-align:right;"><button class="action-icon-btn act-edit" data-id="' + item.id + '">改</button><button class="action-icon-btn act-del" data-id="' + item.id + '">删</button></td>';
                    tbody.appendChild(tr);
                });
                
                document.querySelectorAll('.act-edit').forEach(function(btn) {
                    btn.addEventListener('click', function() { 
                        var id = parseInt(this.dataset.id); 
                        var item = navItems.find(function(i) { return i.id === id; }); 
                        if (item) fillForm(item); 
                    });
                });
                
                document.querySelectorAll('.act-del').forEach(function(btn) {
                    btn.addEventListener('click', async function() { 
                        if (confirm('确认删除？')) { 
                            await fetch('/api/navigation/delete/' + this.dataset.id, { method: 'POST' }); 
                            window.parent.postMessage({ type: 'refreshMenu' }, '*'); 
                            location.reload(); 
                        } 
                    });
                });
            }
            
            renderTable();
            
            var saveBtn = document.getElementById('saveItemBtn');
            if (saveBtn) {
                saveBtn.onclick = async function() {
                    var id = document.getElementById('itemId').value;
                    var payload = { 
                        title: document.getElementById('itemTitle').value, 
                        url: document.getElementById('itemUrl').value, 
                        icon: document.getElementById('itemIcon').value, 
                        open_type: document.getElementById('itemOpenType').value, 
                        parent_id: parseInt(document.getElementById('itemParent').value) || 0, 
                        sort_order: parseInt(document.getElementById('itemOrder').value) || 0, 
                        min_role_required: document.getElementById('itemRole').value 
                    };
                    if (!payload.title) return alert('请填写条目名称');
                    try {
                        var response = await fetch(id ? '/api/navigation/update/' + id : '/api/navigation/add', { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify(payload) 
                        });
                        if (response.ok) {
                            document.getElementById('resetFormBtn').click();
                            window.parent.postMessage({ type: 'refreshMenu' }, '*');
                            location.reload();
                        } else {
                            alert('保存失败');
                        }
                    } catch (error) {
                        alert('保存失败: ' + error.message);
                    }
                };
            }
            
            var resetBtn = document.getElementById('resetFormBtn');
            if (resetBtn) {
                resetBtn.onclick = function() { 
                    document.getElementById('itemId').value = ''; 
                    document.getElementById('itemTitle').value = ''; 
                    document.getElementById('itemUrl').value = ''; 
                    document.getElementById('itemIcon').value = ''; 
                    document.getElementById('itemOpenType').value = 'iframe'; 
                    document.getElementById('itemParent').value = '0'; 
                    document.getElementById('itemOrder').value = '0'; 
                    document.getElementById('itemRole').value = 'visitor'; 
                    var iconInput = document.getElementById('itemIcon');
                    if (iconInput) iconInput.dispatchEvent(new Event('input'));
                };
            }
        }

        function fillForm(item) {
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemUrl').value = item.url || '';
            document.getElementById('itemIcon').value = item.icon || '';
            document.getElementById('itemOpenType').value = item.open_type;
            document.getElementById('itemParent').value = item.parent_id;
            document.getElementById('itemOrder').value = item.sort_order;
            document.getElementById('itemRole').value = item.min_role_required;
            var iconInput = document.getElementById('itemIcon');
            if (iconInput) iconInput.dispatchEvent(new Event('input'));
        }

        function initUserManagement(users) {
            var tbody = document.getElementById('usersTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            users.forEach(function(u) { 
                var tr = document.createElement('tr'); 
                tr.innerHTML = '<td>' + escapeHtml(u.username) + '</td><td><span class="badge">' + u.role + '</span></td><td style="text-align:right;"><button class="action-icon-btn act-del" data-id="' + u.id + '">删除</button></td>'; 
                tbody.appendChild(tr); 
            });
            
            document.querySelectorAll('#usersTableBody .act-del').forEach(function(btn) {
                btn.addEventListener('click', async function() { 
                    if (confirm('确定删除此用户？')) { 
                        await fetch('/api/users/delete/' + this.dataset.id, { method: 'POST' }); 
                        window.parent.postMessage({ type: 'refreshMenu' }, '*'); 
                        location.reload(); 
                    } 
                });
            });
            
            var addBtn = document.getElementById('addUserBtn');
            if (addBtn) {
                addBtn.onclick = async function() {
                    var username = document.getElementById('newUsername').value;
                    var password = document.getElementById('newPassword').value;
                    var role = document.getElementById('newUserRole').value;
                    if (!username || !password) return alert('请填写完整信息');
                    if (password.length < 4) return alert('密码长度至少4位');
                    await fetch('/api/users/add', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ username: username, password: password, role: role }) 
                    });
                    window.parent.postMessage({ type: 'refreshMenu' }, '*');
                    location.reload();
                };
            }
        }

        function initThemeManagement() {
            var presetThemes = { 
                'dark-cyan': { primary: '#00f0ff', accent: '#7000ff', bg: '#0b111e', sidebarBg: '#0f182a', textPrimary: '#e2e8f0', textSecondary: '#94a3b8' },
                'dark-purple': { primary: '#a855f7', accent: '#7c3aed', bg: '#0a0a1a', sidebarBg: '#0f0f1a', textPrimary: '#f0e6ff', textSecondary: '#a78bfa' },
                'dark-blue': { primary: '#3b82f6', accent: '#1d4ed8', bg: '#0f172a', sidebarBg: '#1e293b', textPrimary: '#e2e8f0', textSecondary: '#94a3b8' },
                'dark-green': { primary: '#10b981', accent: '#059669', bg: '#0a1a12', sidebarBg: '#0f2418', textPrimary: '#d1fae5', textSecondary: '#6ee7b7' },
                'dark-orange': { primary: '#f59e0b', accent: '#d97706', bg: '#1a1008', sidebarBg: '#241a0f', textPrimary: '#fef3c7', textSecondary: '#fcd34d' },
                'dark-pink': { primary: '#ec4899', accent: '#db2777', bg: '#1a0a14', sidebarBg: '#241018', textPrimary: '#fce7f3', textSecondary: '#f9a8d4' }
            };
            
            document.querySelectorAll('.preset-theme-item').forEach(function(item) {
                item.onclick = function() {
                    var colors = presetThemes[this.dataset.theme];
                    if (colors) {
                        applyThemeAndNotify(colors);
                        document.querySelectorAll('.preset-theme-item').forEach(function(i) { i.classList.remove('active'); });
                        this.classList.add('active');
                    }
                };
            });
            
            var applyBtn = document.getElementById('applyCustomThemeBtn');
            if (applyBtn) {
                applyBtn.onclick = function() {
                    var colors = {
                        primary: document.getElementById('primaryColor').value,
                        accent: document.getElementById('accentColor').value,
                        bg: document.getElementById('bgColor').value,
                        sidebarBg: document.getElementById('sidebarBgColor').value,
                        textPrimary: document.getElementById('textPrimaryColor').value,
                        textSecondary: document.getElementById('textSecondaryColor').value
                    };
                    applyThemeAndNotify(colors);
                    document.querySelectorAll('.preset-theme-item').forEach(function(i) { i.classList.remove('active'); });
                };
            }
            
            var resetBtn = document.getElementById('resetThemeBtn');
            if (resetBtn) {
                resetBtn.onclick = function() {
                    var defaultColors = presetThemes['dark-cyan'];
                    applyThemeAndNotify(defaultColors);
                    document.querySelectorAll('.preset-theme-item').forEach(function(i) { i.classList.remove('active'); });
                    document.querySelector('[data-theme="dark-cyan"]')?.classList.add('active');
                };
            }
            
            var saveThemeBtn = document.getElementById('saveThemeBtn');
            if (saveThemeBtn) {
                saveThemeBtn.onclick = function() {
                    var title = document.getElementById('cfgLogoText').value;
                    var letter = document.getElementById('cfgLogoLetter').value;
                    fetch('/api/config/update', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ sidebar_title: title, sidebar_letter: letter }) 
                    }).then(function() { window.parent.postMessage({ type: 'refreshConfig' }, '*'); });
                };
            }
            
            ['blurEffectToggle', 'glowEffectToggle', 'compactModeToggle', 'iconAnimationToggle'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    var saved = localStorage.getItem(id);
                    if (saved !== null) el.checked = saved === 'true';
                    el.onchange = function() {
                        localStorage.setItem(id, this.checked);
                        window.parent.postMessage({ type: 'applyEffects', effects: {
                            blur: localStorage.getItem('blurEffectToggle') !== 'false',
                            glow: localStorage.getItem('glowEffectToggle') !== 'false',
                            compact: localStorage.getItem('compactModeToggle') === 'true',
                            animation: localStorage.getItem('iconAnimationToggle') !== 'false'
                        } }, '*');
                    };
                }
            });
        }

        async function init() { 
            if (await checkAuth()) await renderAdminPanel(); 
            else showAccessDenied(); 
        }
        init();
    </script>
</body>
</html>
