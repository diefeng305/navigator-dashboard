<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>首页仪表盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0b111e;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 24px 28px;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        
        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 32px;
            min-height: 100px;
        }
        
        .left-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            transition: opacity 0.2s, background 0.3s ease;
        }
        
        .welcome-title.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .datetime-area {
            display: flex !important;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
            min-height: 24px;
            transition: opacity 0.2s;
        }
        
        .datetime-area.hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        
        .date-clickable {
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
        }
        
        .date-clickable:hover {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
        }
        
        .weather-area {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-shrink: 0;
            min-width: 0;
            max-width: 100%;
        }
        
        .weather-area.empty {
            min-width: 0;
        }
        
        .weather-widget {
            background: rgba(15, 24, 42, 0.6);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 8px 16px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            overflow: hidden;
        }
        
        .weather-widget:hover {
            border-color: rgba(0, 240, 255, 0.3);
        }
        
        .weather-iframe-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            max-width: 100%;
            padding: 4px 0;
        }
        
        .weather-iframe-wrapper iframe {
            border: none;
            border-radius: 12px;
            display: block;
            max-width: 100%;
        }
        
        .weather-content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: nowrap;
        }
        
        .weather-temp {
            font-size: 32px;
            font-weight: 700;
            color: #00f0ff;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }
        
        .weather-info {
            text-align: right;
            color: #e2e8f0;
        }
        
        .weather-city {
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }
        
        .weather-desc {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .weather-humidity {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .weather-error {
            color: #ef4444;
            font-size: 12px;
        }
        
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .dashboard-card {
            width: 100%;
            background: rgba(15, 24, 42, 0.6);
            border: 1px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .dashboard-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid #1e293b;
            background: rgba(15, 24, 42, 0.6);
            transition: background 0.3s ease;
        }
        
        .card-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .card-title-section i {
            font-size: 18px;
            color: #00f0ff;
            transition: color 0.3s ease;
        }
        
        .card-title-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .card-body {
            padding: 20px 24px;
        }
        
        .card-header-filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-header-filter .emby-type-filter {
            background: rgba(11, 17, 30, 0.6);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 4px 10px;
            color: #e2e8f0;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
            height: 30px;
        }
        
        .card-header-filter .emby-type-filter:hover {
            border-color: #00f0ff;
        }
        
        .card-header-filter .emby-type-filter:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.1);
        }
        
        .card-header-filter .emby-type-filter option {
            background: #0b111e;
            color: #e2e8f0;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #e2e8f0;
        }
        
        .progress-bar {
            background: #1e293b;
            border-radius: 10px;
            height: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #00f0ff, #0072ff);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s, background 0.3s ease;
        }
        
        .stats-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .stat-big-card {
            text-align: center;
            padding: 20px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
        }
        
        .stat-big-number {
            font-size: 36px;
            font-weight: 700;
            color: #00f0ff;
            transition: color 0.3s ease;
        }
        
        .stat-big-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }
        
        .media-card-container {
            position: relative;
        }
        
        .media-scroll-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .media-scroll-wrapper::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        
        .media-horizontal-list {
            display: flex;
            gap: 16px;
            padding-bottom: 4px;
            min-width: min-content;
        }
        
        .media-item {
            flex-shrink: 0;
            width: 140px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .media-item:hover {
            transform: translateY(-4px);
        }
        
        .media-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            background: #1e293b;
        }
        
        .media-title {
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e2e8f0;
        }
        
        .media-year {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }
        
        .card-scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            background: rgba(15, 24, 42, 0.9);
            border: 1px solid #1e293b;
            border-radius: 50%;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        
        .card-scroll-btn:hover {
            background: #00f0ff;
            color: #0b111e;
            border-color: #00f0ff;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .card-scroll-left {
            left: -12px;
        }
        
        .card-scroll-right {
            right: -12px;
        }
        
        .zblog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        
        .zblog-category {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            transition: background 0.3s ease;
        }
        
        .zblog-cat-title {
            font-size: 15px;
            font-weight: 600;
            color: #00f0ff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            transition: color 0.3s ease;
        }
        
        .zblog-post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .zblog-post-item {
            margin-bottom: 8px;
        }
        
        .zblog-post-item:last-child {
            margin-bottom: 0;
        }
        
        .zblog-post-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #e2e8f0;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .zblog-post-link:hover {
            background: rgba(0, 240, 255, 0.08);
            color: #00f0ff;
        }
        
        .zblog-thumb-wrapper {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
        }
        
        .zblog-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .zblog-thumb-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 16px;
        }
        
        .zblog-post-title {
            font-size: 13px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .zblog-post-empty {
            color: #64748b;
            font-size: 12px;
            padding: 4px 8px;
        }
        
        .error-card,
        .empty-card {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        
        .error-card i,
        .empty-card i {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .btn-slate {
            background: #1e293b;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
            margin-top: 12px;
            transition: all 0.2s;
        }
        
        .btn-slate:hover {
            background: #334155;
            color: #fff;
        }
        
        .btn-cyan {
            background: linear-gradient(135deg, #00f0ff, #0072ff);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-cyan:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3);
        }
        
        .json-preview {
            background: #0b111e;
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            overflow-x: auto;
            color: #94a3b8;
            font-family: monospace;
        }
        
        .loading-card {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(0, 240, 255, 0.1);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .empty-cards {
            text-align: center;
            padding: 60px 20px;
            background: rgba(15, 24, 42, 0.6);
            border-radius: 20px;
            border: 1px dashed #1e293b;
            transition: background 0.3s ease;
        }
        
        .empty-cards i {
            font-size: 48px;
            color: #475569;
            margin-bottom: 16px;
        }
        
        .calendar-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .calendar-dialog {
            background: #0f182a;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            width: 400px;
            max-width: 90vw;
            overflow: hidden;
            animation: modalFadeIn 0.2s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #1e293b;
            background: rgba(15, 24, 42, 0.95);
        }
        
        .calendar-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .calendar-nav,
        .calendar-close {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .calendar-nav:hover,
        .calendar-close:hover {
            background: #1e293b;
            color: #00f0ff;
        }
        
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 12px 8px;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 1px solid #1e293b;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 12px;
            gap: 4px;
        }
        
        .calendar-day {
            position: relative;
            text-align: center;
            padding: 10px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 40px;
        }
        
        .calendar-day:hover {
            background: rgba(0, 240, 255, 0.1);
        }
        
        .calendar-day .solar-day {
            font-size: 14px;
            font-weight: 500;
            display: block;
            color: #e2e8f0;
        }
        
        .calendar-day .lunar-day {
            font-size: 9px;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }
        
        .calendar-day.today {
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid #00f0ff;
            transition: border-color 0.3s ease;
        }
        
        .calendar-day.selected {
            background: rgba(0, 240, 255, 0.3);
            border: 1px solid #00f0ff;
        }
        
        .calendar-day.has-festival .solar-day {
            color: #f59e0b;
        }
        
        .calendar-day .festival-badge,
        .calendar-day .term-badge {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            padding: 1px 4px;
            border-radius: 8px;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .calendar-day .term-badge {
            background: rgba(0, 240, 255, 0.2);
            color: #00f0ff;
        }
        
        .calendar-day.empty {
            cursor: default;
            background: none;
        }
        
        .calendar-footer {
            padding: 16px 20px;
            border-top: 1px solid #1e293b;
            font-size: 13px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.2);
            color: #e2e8f0;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .welcome-title {
                font-size: 22px;
            }
            .media-item {
                width: 110px;
            }
            .media-item img {
                height: 160px;
            }
            .card-body {
                padding: 16px;
            }
            .card-scroll-left {
                left: -8px;
            }
            .card-scroll-right {
                right: -8px;
            }
            .card-scroll-btn {
                width: 28px;
                height: 28px;
            }
            .calendar-dialog {
                width: 95vw;
            }
            .calendar-day {
                padding: 6px 2px;
            }
            .calendar-day .solar-day {
                font-size: 12px;
            }
            .weather-temp {
                font-size: 24px;
            }
            .weather-content {
                gap: 12px;
            }
            .weather-widget {
                padding: 6px 12px;
            }
            .weather-iframe-wrapper iframe {
                height: 120px !important;
            }
            .zblog-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="home-header">
        <div class="left-area">
            <div class="welcome-title" id="welcomeTitle">欢迎回来</div>
            <div class="datetime-area" id="datetimeArea">
                <div class="date-clickable" id="dateClickable">
                    <i class="fa-regular fa-calendar"></i>
                    <span id="dateText">加载中...</span>
                </div>
                <span id="timeText">--:--:--</span>
            </div>
        </div>
        <div class="weather-area" id="weatherArea"></div>
    </div>

    <div class="cards-container" id="cardsContainer">
        <div class="loading-card"><div class="spinner"></div><span>加载卡片中...</span></div>
    </div>

    <script>
        // ================================================================
        //  1. 全局变量
        // ================================================================
        var weatherCard = null;
        var normalCards = [];
        var pageConfig = { show_welcome: true, show_datetime: true, custom_welcome: '' };
        var datetimeTimer = null;

        // ================================================================
        //  2. 工具函数
        // ================================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) : '0, 240, 255';
        }

        // ================================================================
        //  3. 日期时间更新
        // ================================================================
        function updateDateTime() {
            try {
                var now = new Date();
                var year = now.getFullYear();
                var month = String(now.getMonth() + 1).padStart(2, '0');
                var day = String(now.getDate()).padStart(2, '0');
                var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                var weekday = weekdays[now.getDay()];

                var dateEl = document.getElementById('dateText');
                var timeEl = document.getElementById('timeText');

                if (dateEl) {
                    dateEl.textContent = year + '/' + month + '/' + day + ' ' + weekday;
                }
                if (timeEl) {
                    var h = String(now.getHours()).padStart(2, '0');
                    var m = String(now.getMinutes()).padStart(2, '0');
                    var s = String(now.getSeconds()).padStart(2, '0');
                    timeEl.textContent = h + ':' + m + ':' + s;
                }
            } catch (e) {}
        }

        // ================================================================
        //  4. 主题管理
        // ================================================================
        function applyThemeToHome(colors) {
            if (!colors) return;

            var primary = colors.primary || '#00f0ff';
            var accent = colors.accent || '#0072ff';
            var bg = colors.bg || '#0b111e';
            var sidebarBg = colors.sidebarBg || '#0f182a';

            document.body.style.backgroundColor = bg;

            var cardElements = document.querySelectorAll(
                '.dashboard-card, .weather-widget, .empty-cards, .card-item'
            );
            cardElements.forEach(function(el) {
                el.style.backgroundColor = sidebarBg;
            });

            var cardHeaders = document.querySelectorAll('.card-header');
            cardHeaders.forEach(function(el) {
                el.style.backgroundColor = sidebarBg;
            });

            var zblogCategories = document.querySelectorAll('.zblog-category');
            zblogCategories.forEach(function(el) {
                el.style.backgroundColor = sidebarBg;
            });

            var styleSheet = document.createElement('style');
            styleSheet.id = 'dynamic-theme-home';
            styleSheet.textContent = `
                .card-title-section i { color: ${primary}; }
                .stat-big-number { color: ${primary}; }
                .progress-fill { background: linear-gradient(90deg, ${primary}, ${accent}); }
                .card-scroll-btn:hover { background: ${primary}; color: #0b111e; border-color: ${primary}; }
                .calendar-day.today { border-color: ${primary}; }
                .weather-temp { color: ${primary}; }
                .welcome-title { background: linear-gradient(135deg, #fff, ${primary}); -webkit-background-clip: text; background-clip: text; }
                .btn-cyan { background: linear-gradient(135deg, ${primary}, ${accent}); }

        function getLunarYearInfo(year) { return lunarInfo[year - 1900]; }

        function getLunarMonthDays(year, month) {
            var info = getLunarYearInfo(year);
            if (month > 12 || month < 1) return 0;
            return (info & (0x10000 >> month)) ? 30 : 29;
        }

        function getLeapMonth(year) { return getLunarYearInfo(year) & 0xf; }

        function getLeapMonthDays(year) {
            var info = getLunarYearInfo(year);
            return (info & 0x10000) ? 30 : 29;
        }

        function getLunarYearDays(year) {
            var sum = 348;
            for (var i = 0x8000; i > 0x8; i >>= 1) {
                sum += (getLunarYearInfo(year) & i) ? 1 : 0;
            }
            return sum + getLeapMonthDays(year);
        }

        function getLunarMonthName(month, isLeap) {
            var monthNames = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            return (isLeap ? '闰' : '') + monthNames[month - 1];
        }

        function getLunarDayName(day) {
            if (day === 0) return '';
            if (day <= 10) return nStr2[0] + nStr1[day];
            if (day === 20) return nStr2[2] + nStr1[10];
            if (day === 30) return nStr2[3] + nStr1[10];
            var tens = Math.floor(day / 10);
            var ones = day % 10;
            return nStr2[tens] + (ones === 0 ? nStr1[10] : nStr1[ones]);
        }

        function solarToLunar(date) {
            var year = date.getFullYear();
            var baseDate = new Date(1900, 0, 31);
            var offset = Math.floor((date - baseDate) / (24 * 60 * 60 * 1000));

            var i = 1900;
            var temp = 0;
            var lunarYear = 1900;
            for (i = 1900; i <= 2100; i++) {
                temp = getLunarYearDays(i);
                if (offset - temp < 1) break;
                offset -= temp;
            }
            lunarYear = i;

            var leap = getLeapMonth(lunarYear);
            var isLeap = false;
            var lunarMonth = 1;

            for (var j = 1; j <= 12; j++) {
                if (leap > 0 && j === leap + 1 && !isLeap) {
                    j--;
                    isLeap = true;
                    temp = getLeapMonthDays(lunarYear);
                } else {
                    temp = getLunarMonthDays(lunarYear, j);
                }
                if (offset < temp) break;
                offset -= temp;
                lunarMonth = j + 1;
            }

            if (leap > 0 && lunarMonth > leap && !isLeap) lunarMonth--;

            return {
                year: lunarYear,
                month: lunarMonth,
                day: offset + 1,
                isLeap: isLeap,
                monthName: getLunarMonthName(lunarMonth, isLeap),
                dayName: getLunarDayName(offset + 1)
            };
        }

        function getFestival(year, month, day, lunar) {
            var solarKey = month + '-' + day;
            var lunarKey = lunar.month + '-' + lunar.day;
            if (festivals[solarKey]) return festivals[solarKey];
            if (lunarFestivals[lunarKey] && !lunar.isLeap) return lunarFestivals[lunarKey];
            return '';
        }

        function getSolarTerm(year, month, day) {

                '11-7': '立冬',
                '11-22': '小雪',
                '12-7': '大雪',
                '12-21': '冬至'
            };
            return termMap[month + '-' + day] || '';
        }

        function getZodiac(year) {
            var zodiacs = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];

        function initCalendar() {
            if (calendarDialog) return;

            var dialog = document.createElement('div');
            dialog.className = 'calendar-dialog-overlay';
            dialog.id = 'calendarDialog';
            dialog.innerHTML = `
                    <div class="calendar-dialog">
                        <div class="calendar-header">
                            <button class="calendar-nav prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                            <span class="calendar-title"></span>
                            <button class="calendar-nav next-month"><i class="fa-solid fa-chevron-right"></i></button>
                            <button class="calendar-close"><i class="fa-solid fa-times"></i></button>
                        </div>
                        <div class="calendar-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
                        <div class="calendar-days" id="calendarDays"></div>
                        <div class="calendar-footer" id="calendarFooter"></div>
                    </div>
                `;
            document.body.appendChild(dialog);

            var currentDate = new Date();
            var overlay = dialog;

            function renderCalendar() {
                var year = currentDate.getFullYear();
                var month = currentDate.getMonth();
                var today = new Date();

                dialog.querySelector('.calendar-title').textContent = year + '年 ' + (month + 1) + '月';

                var firstDay = new Date(year, month, 1);
                var startWeek = firstDay.getDay();
                var lastDay = new Date(year, month + 1, 0);
                var daysInMonth = lastDay.getDate();

                var html = '';
                for (var i = 0; i < startWeek; i++) html += '<div class="calendar-day empty"></div>';

                for (var d = 1; d <= daysInMonth; d++) {
                    var date = new Date(year, month, d);
                    var isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    var lunar = solarToLunar(date);
                    var festival = getFestival(year, month + 1, d, lunar);
                    var solarTerm = getSolarTerm(year, month + 1, d);

                    var extraClass = '';
                    var badgeHtml = '';
                    if (festival) {
                        extraClass = 'has-festival';
                        badgeHtml = '<span class="festival-badge">' + festival + '</span>';
                    } else if (solarTerm) {
                        extraClass = 'has-term';
                        badgeHtml = '<span class="term-badge">' + solarTerm + '</span>';
                    }

                    html += `
                            <div class="calendar-day ${isToday ? 'today' : ''} ${extraClass}" 
                                 data-year="${year}" data-month="${month + 1}" data-day="${d}"
                                 data-lunar="${lunar.monthName}${lunar.dayName}"
                                 data-festival="${festival || ''}">
                                <span class="solar-day">${d}</span>
                                <span class="lunar-day">${lunar.dayName}</span>
                                ${badgeHtml}
                            </div>
                        `;
                }

                dialog.querySelector('.calendar-days').innerHTML = html;

                var nowDate = new Date();
                var currentLunar = solarToLunar(nowDate);
                var currentFestival = getFestival(nowDate.getFullYear(), nowDate.getMonth() + 1, nowDate.getDate(), currentLunar);
                var zodiac = getZodiac(nowDate.getFullYear());

                var footerHtml = '<div><strong>农历</strong> ' + currentLunar.monthName + currentLunar.dayName + '</div><div><strong>生肖</strong> ' + zodiac + '年</div>';
                if (currentFestival) footerHtml += '<div><strong>🎉 节日</strong> ' + currentFestival + '</div>';
                dialog.querySelector('.calendar-footer').innerHTML = footerHtml;

                document.querySelectorAll('.calendar-day:not(.empty)').forEach(function(day) {
                    day.onclick = function() {
                        var y = parseInt(this.dataset.year);
                        var m = parseInt(this.dataset.month);
                        var d = parseInt(this.dataset.day);
                        var festivalInfo = this.dataset.festival || '';
                        var date = new Date(y, m - 1, d);
                        var lunar = solarToLunar(date);
                        var zodiacSign = getZodiac(y);
                        var solarTermInfo = getSolarTerm(y, m, d);

                        var infoHtml = '<div><strong>📅 ' + y + '年' + m + '月' + d + '日</strong></div><div><strong>🌙 农历</strong> ' + lunar.monthName + lunar.dayName + '</div><div><strong>🐉 生肖</strong> ' + zodiacSign + '年</div>';
                        if (festivalInfo) infoHtml += '<div><strong>🎉 节日</strong> ' + festivalInfo + '</div>';
                        if (solarTermInfo) infoHtml += '<div><strong>🌱 节气</strong> ' + solarTermInfo + '</div>';
                        dialog.querySelector('.calendar-footer').innerHTML = infoHtml;
                        document.querySelectorAll('.calendar-day').forEach(function(el) { el.classList.remove('selected'); });
                        this.classList.add('selected');
                    };
                });
            }

            dialog.querySelector('.prev-month').onclick = function() { currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar(); };
            dialog.querySelector('.next-month').onclick = function() { currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar(); };
            dialog.querySelector('.calendar-close').onclick = function() { overlay.style.display = 'none'; };
            overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };

            calendarDialog = overlay;
            renderCalendar();
        }

        var cardComponents = {};
        var loadedModules = {};

        var CARD_MODULES = {
            'system': '/js/cards/system-card.js',
            'stats': '/js/cards/stats-card.js',
            'emby': '/js/cards/emby-card.js',
            'zblog': '/js/cards/zblog-card.js'
        };

        function loadCardModule(componentName) {
            return new Promise(function(resolve, reject) {
                if (loadedModules[componentName]) {
                    resolve();
                    return;
                }
                
                var scriptPath = CARD_MODULES[componentName];
                if (!scriptPath) {
                    resolve();
                    return;
                }
                
                var script = document.createElement('script');
                script.src = scriptPath;
                script.onload = function() {
                    loadedModules[componentName] = true;
                    resolve();
                };
                script.onerror = function() {
                    console.error('加载卡片组件失败:', componentName);
                    resolve();
                };
                document.head.appendChild(script);
            });
        }

        function getCardComponent(componentName) {
            if (cardComponents[componentName]) {
                return cardComponents[componentName];
            }
            
            var globalName = componentName.charAt(0).toUpperCase() + componentName.slice(1) + 'Card';
            if (window[globalName]) {
                cardComponents[componentName] = window[globalName];
                return window[globalName];
            }
            
            return null;
        }

        function getCardIcon(type) {
            var icons = {
                'emby': 'fa-solid fa-film',

                'weather': 'fa-solid fa-cloud-sun',

            return icons[type] || 'fa-solid fa-chart-simple';
        }

                container.innerHTML = `

                            <i class="fa-solid fa-plus"></i> 去添加卡片
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '<div class="loading-card"><div class="spinner"></div><span>加载卡片组件...</span></div>';
            
            var cardsHtml = '';
            
            for (var i = 0; i < normalCards.length; i++) {
                var card = normalCards[i];
                var cardId = card.id;
                var cardTitle = card.title || '未命名卡片';
                var componentName = card.data.component || 'error';
                var componentData = card.data.data || {};
                
                try {
                    // 确保组件已加载
                    await loadCardModule(componentName);
                    
                    var component = getCardComponent(componentName);
                    if (!component || typeof component.render !== 'function') {
                        throw new Error('卡片组件未加载: ' + componentName);
                    }
                    
                    var bodyHtml = component.render(cardId, componentData);
                    
                    // 获取筛选HTML（Emby卡片专用）
                    var filterHtml = '';
                    if (componentName === 'emby' && window._embyFilterHtml) {
                        filterHtml = window._embyFilterHtml;
                        window._embyFilterHtml = null;
                    }
                    
                    // 构建卡片头部
                    var headerHtml = '<div class="card-header">' +
                        '<div class="card-title-section">' +
                        '<i class="' + getCardIcon(componentName) + '"></i>' +
                        '<h3>' + escapeHtml(cardTitle) + '</h3>' +
                        '</div>';
                    
                    if (filterHtml) {
                        headerHtml += '<div class="card-header-filter">' + filterHtml + '</div>';
                    }
                    
                    headerHtml += '</div>';
                    
                    cardsHtml += '<div class="dashboard-card" data-card-id="' + cardId + '">' + 
                        headerHtml + 
                        '<div class="card-body">' + 
                        bodyHtml + 
                        '</div>' + 
                        '</div>';
                        
                } catch (e) {
                    console.error('渲染卡片失败:', e);
                    cardsHtml += '<div class="dashboard-card"><div class="card-header"><div class="card-title-section"><i class="fa-solid fa-circle-exclamation"></i><h3>' + escapeHtml(cardTitle) + '</h3></div></div><div class="card-body"><div class="error-card"><i class="fa-solid fa-circle-exclamation"></i><p>渲染失败: ' + escapeHtml(e.message) + '</p></div></div></div>';
                }
            }
            
            container.innerHTML = cardsHtml;
            
            // 绑定卡片事件
            bindCardEvents();
        }

        // ================================================================
        //  10. 绑定卡片事件

        function bindCardEvents() {
            document.querySelectorAll('.card-scroll-btn').forEach(function(btn) {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    var cardId = this.dataset.cardId;
                    var scrollWrapper = document.getElementById('media-scroll-' + cardId);
                    if (!scrollWrapper) return;
                    var direction = this.classList.contains('card-scroll-left') ? -280 : 280;
                    scrollWrapper.scrollBy({ left: direction, behavior: 'smooth' });
                };
            });
            
            document.querySelectorAll('.emby-type-filter').forEach(function(select) {
                select.onchange = function() {
                    var cardId = this.dataset.cardId;
                    var mediaType = this.value;
                    // 调用 Emby 卡片的筛选方法（只刷新单张卡片）
                    if (window.EmbyCard && typeof window.EmbyCard.filter === 'function') {
                        window.EmbyCard.filter(cardId, mediaType);
                    } else {
                        // 降级方案：刷新整个页面
                        loadCardsData();
                    }
                };
            });
        }

        // ================================================================
        //  11. 加载卡片数据
        // ================================================================
        async function loadCardsData() {
            var container = document.getElementById('cardsContainer');
            container.innerHTML = '<div class="loading-card"><div class="spinner"></div><span>加载卡片中...</span></div>';

            try {
                var response = await fetch('/api/home/cards/data');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var cards = await response.json();

                weatherCard = cards.find(function(c) { return c.card_type === 'weather'; }) || null;
                normalCards = cards.filter(function(c) { return c.card_type !== 'weather'; });
                normalCards.sort(function(a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });

                renderWeatherWidget(weatherCard);
                await renderAllCards();
            } catch (error) {
                console.error('加载卡片数据失败:', error);
                container.innerHTML = `
                    <div class="empty-cards">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <p>加载失败: ${error.message}</p>
                        <button class="btn-cyan" onclick="location.reload()">重试</button>
                    </div>
                `;
            }
        }

        // ================================================================
        //  12. 监听消息
        // ================================================================
        window.addEventListener('message', function(event) {
            var data = event.data;
            if (!data) return;
            
            if (data.type === 'applyTheme') {
                applyThemeToHome(data.colors);
            }
            
            if (data.type === 'refreshHome') {
                loadCardsData();
                loadPageConfig();
            }
        });

        // ================================================================
        //  13. 初始化
        // ================================================================
        async function init() {
            loadSavedTheme();
            
            updateDateTime();
            if (datetimeTimer) {
                clearInterval(datetimeTimer);
            }
            datetimeTimer = setInterval(updateDateTime, 1000);

            await loadPageConfig();
            await loadCardsData();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
